<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Emulator</title>
    <script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; }
        #controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #rom-input {
            padding: 8px 12px;
            background: #16213e;
            color: #eee;
            border: 1px solid #0f3460;
            border-radius: 6px;
            cursor: pointer;
        }
        button {
            padding: 8px 16px;
            background: #0f3460;
            color: #eee;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #1a4a7a; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #nes {
            width: 512px;
            height: 480px;
            background: #000;
            border: 3px solid #0f3460;
            border-radius: 8px;
            overflow: hidden;
        }
        #instructions {
            margin-top: 20px;
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            max-width: 512px;
            width: 100%;
        }
        #instructions h3 { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 4px 8px; border-bottom: 1px solid #0f3460; font-size: 13px; }
        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }
        #rom-url-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #rom-url {
            padding: 8px 12px;
            background: #16213e;
            color: #eee;
            border: 1px solid #0f3460;
            border-radius: 6px;
            width: 280px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1>🎮 NES Emulator</h1>
    <div id="controls">
        <input type="file" id="rom-input" accept=".nes">
        <span style="color:#aaa;">or</span>
        <div id="rom-url-form">
            <input type="text" id="rom-url" placeholder="Enter ROM URL...">
            <button id="load-url-btn">Load URL</button>
        </div>
        <button id="reset-btn" disabled>Reset</button>
        <button id="screenshot-btn" disabled>Screenshot</button>
    </div>
    <div id="nes"></div>
    <p id="status">Load a .nes ROM file to start playing.</p>

    <div id="instructions">
        <h3>🎮 Controls</h3>
        <table>
            <tr><td><strong>D-Pad</strong></td><td>Arrow Keys</td></tr>
            <tr><td><strong>A Button</strong></td><td>X</td></tr>
            <tr><td><strong>B Button</strong></td><td>Z</td></tr>
            <tr><td><strong>Start</strong></td><td>Enter</td></tr>
            <tr><td><strong>Select</strong></td><td>Right Ctrl</td></tr>
            <tr><td><strong>Turbo A</strong></td><td>S</td></tr>
            <tr><td><strong>Turbo B</strong></td><td>A</td></tr>
        </table>
    </div>

    <script>
        const nesContainer = document.getElementById('nes');
        const romInput = document.getElementById('rom-input');
        const romUrlInput = document.getElementById('rom-url');
        const loadUrlBtn = document.getElementById('load-url-btn');
        const resetBtn = document.getElementById('reset-btn');
        const screenshotBtn = document.getElementById('screenshot-btn');
        const status = document.getElementById('status');

        let browser = null;

        function initBrowser(romData) {
            // Destroy previous instance if exists
            if (browser) {
                try { browser.destroy(); } catch(e) {}
                nesContainer.innerHTML = '';
            }

            browser = new jsnes.Browser({
                container: nesContainer,
                romData: romData,
                onError: function(e) {
                    console.error('NES Error:', e);
                    status.textContent = '❌ Emulator error: ' + e.message;
                }
            });

            resetBtn.disabled = false;
            screenshotBtn.disabled = false;
            status.textContent = '✅ ROM loaded! Use keyboard to play.';
        }

        // Load from file
        romInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            status.textContent = '⏳ Loading ' + file.name + '...';

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    // Convert ArrayBuffer to binary string
                    const data = new Uint8Array(event.target.result);
                    let romData = '';
                    for (let i = 0; i < data.length; i++) {
                        romData += String.fromCharCode(data[i]);
                    }
                    initBrowser(romData);
                } catch(err) {
                    status.textContent = '❌ Failed to load ROM: ' + err.message;
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Load from URL
        loadUrlBtn.addEventListener('click', function() {
            const url = romUrlInput.value.trim();
            if (!url) {
                status.textContent = '⚠️ Please enter a ROM URL.';
                return;
            }

            status.textContent = '⏳ Downloading ROM...';

            jsnes.Browser.loadROMFromURL(url, function(err, data) {
                if (err) {
                    status.textContent = '❌ Failed to download ROM: ' + err;
                    console.error(err);
                    return;
                }
                try {
                    initBrowser(data);
                } catch(e) {
                    status.textContent = '❌ Failed to load ROM: ' + e.message;
                    console.error(e);
                }
            });
        });

        // Reset
        resetBtn.addEventListener('click', function() {
            if (browser && browser.nes) {
                browser.nes.reset();
                status.textContent = '🔄 ROM reset.';
            }
        });

        // Screenshot
        screenshotBtn.addEventListener('click', function() {
            if (browser) {
                try {
                    const img = browser.screenshot();
                    const link = document.createElement('a');
                    link.download = 'nes-screenshot.png';
                    link.href = img.src;
                    link.click();
                    status.textContent = '📸 Screenshot saved!';
                } catch(e) {
                    status.textContent = '❌ Screenshot failed: ' + e.message;
                }
            }
        });

        // Enter key on URL input
        romUrlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loadUrlBtn.click();
            }
        });
    </script>
</body>
</html>
