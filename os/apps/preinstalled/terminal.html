<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVM Terminal</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        
        #webvm-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-family: monospace;
            text-align: center;
            z-index: 10;
        }
        
        #loading.hidden { display: none; }
        
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-top: 4px solid #0f0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #activate-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
        }

        #activate-overlay.hidden { display: none; }

        .activate-message {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            padding: 30px 50px;
            border-radius: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>⚡ Loading WebVM...</p>
    </div>

    <div id="activate-overlay" class="hidden">
        <div class="activate-message">
            🖱️ Click to activate terminal
        </div>
    </div>
    
    <iframe 
        id="webvm-frame"
        src="../../../index.html"
        allow="cross-origin-isolated"
        style="opacity: 0; transition: opacity 0.5s;">
    </iframe>
    
    <script>
        const frame = document.getElementById('webvm-frame');
        const loading = document.getElementById('loading');
        const overlay = document.getElementById('activate-overlay');
        
        frame.addEventListener('load', () => {
            loading.classList.add('hidden');
            frame.style.opacity = '1';
            
            // Show activation overlay after WebVM loads
            setTimeout(() => {
                overlay.classList.remove('hidden');
            }, 1000);
        });
        
        // Activate on click
        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            frame.focus();
            frame.contentWindow.focus();
        });

        // Keep iframe focused
        setInterval(() => {
            if (document.hasFocus() && !overlay.classList.contains('hidden')) {
                frame.contentWindow.focus();
            }
        }, 1000);
    </script>
</body>
</html>
