<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVM Terminal</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        
        #webvm-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        #loading.hidden {
            display: none;
        }
        
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-top: 4px solid #0f0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Click instruction overlay */
        #click-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        #click-hint.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>⚡ Loading WebVM Terminal...</p>
        <p style="margin-top: 10px; font-size: 12px; color: #888;">
            Booting Linux environment...
        </p>
    </div>

    <div id="click-hint">
        💡 Click inside the terminal to start typing
    </div>
    
    <iframe 
        id="webvm-frame"
        src="../../../index.html"
        allow="cross-origin-isolated"
        sandbox="allow-same-origin allow-scripts allow-downloads allow-modals allow-forms allow-pointer-lock"
        style="opacity: 0; transition: opacity 0.5s;">
    </iframe>
    
    <script>
        const frame = document.getElementById('webvm-frame');
        const loading = document.getElementById('loading');
        const clickHint = document.getElementById('click-hint');
        
        console.log('Terminal app location:', window.location.href);
        console.log('Loading WebVM from:', frame.src);
        
        // Hide loading when iframe loads
        frame.addEventListener('load', () => {
            console.log('✅ WebVM loaded successfully');
            loading.classList.add('hidden');
            frame.style.opacity = '1';
            
            // Try to focus the iframe after a short delay
            setTimeout(() => {
                frame.contentWindow.focus();
                console.log('🎯 Focused iframe');
                
                // Hide hint after first interaction
                setTimeout(() => {
                    clickHint.classList.add('hidden');
                }, 5000);
            }, 1000);
        });
        
        // Focus iframe when user clicks anywhere in the parent window
        document.addEventListener('click', () => {
            frame.contentWindow.focus();
            clickHint.classList.add('hidden');
        });

        // Also focus when parent window gets focus
        window.addEventListener('focus', () => {
            if (frame.contentWindow) {
                frame.contentWindow.focus();
            }
        });
        
        // Error handling
        frame.addEventListener('error', (e) => {
            console.error('❌ WebVM failed to load:', e);
            loading.innerHTML = `
                <div class="spinner"></div>
                <p style="color: #f00;">❌ Failed to load WebVM</p>
                <p style="margin-top: 10px; font-size: 12px; color: #888;">
                    Check browser console for errors
                </p>
            `;
        });
        
        // Fallback timeout
        setTimeout(() => {
            if (!loading.classList.contains('hidden')) {
                console.warn('⚠ WebVM load timeout - showing anyway');
                loading.classList.add('hidden');
                frame.style.opacity = '1';
            }
        }, 10000);
    </script>
</body>
</html>
