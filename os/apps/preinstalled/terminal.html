<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVM Terminal</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        
        #webvm-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-align: center;
            z-index: 10;
        }
        
        #loading.hidden {
            display: none;
        }
        
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-top: 4px solid #0f0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>⚡ Loading WebVM Terminal...</p>
        <p style="margin-top: 10px; font-size: 12px; color: #888;">
            Booting Linux environment...
        </p>
    </div>
    
    <!-- 
        Path explanation:
        Current: /os/apps/preinstalled/terminal.html
        Target:  /index.html (WebVM root)
        Path:    ../../../index.html (up 3 levels)
    -->
    <iframe 
        id="webvm-frame"
        src="../../../index.html"
        allow="cross-origin-isolated"
        sandbox="allow-same-origin allow-scripts allow-downloads allow-modals allow-forms"
        style="opacity: 0; transition: opacity 0.5s;">
    </iframe>
    
    <script>
        const frame = document.getElementById('webvm-frame');
        const loading = document.getElementById('loading');
        
        // Debug: Log what we're loading
        console.log('Terminal app location:', window.location.href);
        console.log('Loading WebVM from:', frame.src);
        
        // Hide loading when iframe loads
        frame.addEventListener('load', () => {
            console.log('✅ WebVM loaded successfully');
            loading.classList.add('hidden');
            frame.style.opacity = '1';
        });
        
        // Error handling
        frame.addEventListener('error', (e) => {
            console.error('❌ WebVM failed to load:', e);
            loading.innerHTML = `
                <div class="spinner"></div>
                <p style="color: #f00;">❌ Failed to load WebVM</p>
                <p style="margin-top: 10px; font-size: 12px; color: #888;">
                    Check browser console for errors
                </p>
            `;
        });
        
        // Fallback timeout (10 seconds)
        setTimeout(() => {
            if (!loading.classList.contains('hidden')) {
                console.warn('⚠ WebVM load timeout - showing anyway');
                loading.classList.add('hidden');
                frame.style.opacity = '1';
            }
        }, 10000);
    </script>
</body>
</html>
